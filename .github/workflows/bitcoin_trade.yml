name: Bitcoin Signal & Trade

on:
  schedule:
    # Every 5 minutes, Mon–Fri all day (LSE 08:00–16:30 UTC + NYSE 14:30–21:00 UTC)
    # Running 07:00–21:00 UTC covers both windows; GitHub cron is UTC.
    - cron: "*/5 7-21 * * 1-5"
  workflow_dispatch:
    inputs:
      quantity:
        description: "Number of shares to buy"
        required: false
        default: "1"
      execute:
        description: "Actually place the order (true/false)"
        required: false
        default: "true"

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify secrets
        run: |
          if [ -z "$T212_API_KEY" ]; then echo "ERROR: T212_API_KEY secret is missing or empty" && exit 1; fi
          if [ -z "$T212_SECRET_KEY" ]; then echo "ERROR: T212_SECRET_KEY secret is missing or empty" && exit 1; fi
          if [ -z "$OPENROUTER_API_KEY" ]; then echo "ERROR: OPENROUTER_API_KEY secret is missing or empty" && exit 1; fi
          echo "Secrets verified OK"
        env:
          T212_API_KEY: ${{ secrets.T212_API_KEY }}
          T212_SECRET_KEY: ${{ secrets.T212_SECRET_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Run Bitcoin signal and trade
        env:
          T212_API_KEY: ${{ secrets.T212_API_KEY }}
          T212_SECRET_KEY: ${{ secrets.T212_SECRET_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          QUANTITY="${{ github.event.inputs.quantity || '1' }}"
          EXECUTE="${{ github.event.inputs.execute || 'true' }}"

          if [ "$EXECUTE" = "true" ]; then
            node bitcoin_signals.js --execute --quantity "$QUANTITY" --auto-confirm
          else
            node bitcoin_signals.js --quantity "$QUANTITY"
          fi

      - name: Commit state and history
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f last_btc_signal.json btc_signal_history.jsonl 2>/dev/null || true
          git diff --staged --quiet && echo "No state changes" || \
            (git commit -m "state: btc signal $(date -u +%Y-%m-%dT%H:%M)Z" && \
             git push || (git pull --rebase && git push) || echo "[WARN] State push failed")

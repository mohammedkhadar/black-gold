name: Brent Crude Signal & Trade

on:
  schedule:
    # Every 5 minutes during Euronext trading hours: 08:00–16:30 CET = 07:00–15:30 UTC (BST)
    - cron: "*/5 7-15 * * 1-5"
  workflow_dispatch:
    inputs:
      quantity:
        description: "Number of shares to buy"
        required: false
        default: "1"
      execute:
        description: "Actually place the order (true/false)"
        required: false
        default: "true"

jobs:
  trade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Restore last signal state
        uses: actions/cache/restore@v4
        with:
          path: last_signal.json
          key: last-signal-${{ github.run_id }}
          restore-keys: last-signal-

      - name: Verify secrets
        run: |
          if [ -z "$T212_API_KEY" ]; then echo "ERROR: T212_API_KEY secret is missing or empty" && exit 1; fi
          if [ -z "$T212_SECRET_KEY" ]; then echo "ERROR: T212_SECRET_KEY secret is missing or empty" && exit 1; fi
          echo "Secrets verified OK"
        env:
          T212_API_KEY: ${{ secrets.T212_API_KEY }}
          T212_SECRET_KEY: ${{ secrets.T212_SECRET_KEY }}

      - name: Run signal and trade
        env:
          T212_API_KEY: ${{ secrets.T212_API_KEY }}
          T212_SECRET_KEY: ${{ secrets.T212_SECRET_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          QUANTITY="${{ github.event.inputs.quantity || '1' }}"
          EXECUTE="${{ github.event.inputs.execute || 'true' }}"

          if [ "$EXECUTE" = "true" ]; then
            node brent_crude_signals.js --execute --quantity "$QUANTITY" --auto-confirm
          else
            node brent_crude_signals.js --quantity "$QUANTITY"
          fi

      - name: Save last signal state
        uses: actions/cache/save@v4
        if: always()
        with:
          path: last_signal.json
          key: last-signal-${{ github.run_id }}

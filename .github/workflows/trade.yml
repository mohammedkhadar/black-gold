name: Brent Crude Signal & Trade

on:
  schedule:
    # Runs every day at 08:00 UTC (market open London time)
    - cron: "0 8 * * 1-5"
    # Runs every day at 14:00 UTC (afternoon check)
    - cron: "0 14 * * 1-5"
  workflow_dispatch:
    inputs:
      quantity:
        description: "Number of shares to buy"
        required: false
        default: "1"
      execute:
        description: "Actually place the order (true/false)"
        required: false
        default: "true"

jobs:
  trade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run signal and trade
        env:
          T212_API_KEY: ${{ secrets.T212_API_KEY }}
          T212_SECRET_KEY: ${{ secrets.T212_SECRET_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          QUANTITY="${{ github.event.inputs.quantity || '1' }}"
          EXECUTE="${{ github.event.inputs.execute || 'true' }}"

          if [ "$EXECUTE" = "true" ]; then
            node brent_crude_signals.js --execute --quantity "$QUANTITY" --auto-confirm
          else
            node brent_crude_signals.js --quantity "$QUANTITY"
          fi
